name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (with PyArg oracle)
        run: pip install -e ".[dev]"
      - name: Run suite (textbook canon + 1000-AF differential vs PyArg + deploy guard)
        run: pytest -q
      - name: Verify the frozen artifact is byte-reproducible across platforms
        run: |
          python -m argkit.build
          (cd artifact && sha256sum -c SHA256SUMS)
          git diff --exit-code -- artifact/
